<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>راجستر</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

<div class="signup-container">
    <div class="signup-box">
        <h2>راجستر</h2>
        <p>نوی حساب جوړ کړئ</p>

        <form>
            <input type="text" placeholder="ستاسو نوم" required>
            <input type="email" placeholder="بریښنالیک" required>
            <input type="password" placeholder="پټنوم" required>
            <input type="password" placeholder="پټنوم تایید کړئ" required>
            <button type="submit">راجستر</button>
        </form>

        <p class="bottom-text">
            حساب لرئ؟ <a href="login.html">ننوتل</a>
        </p>
    </div>
</div>

</body>
</html>
